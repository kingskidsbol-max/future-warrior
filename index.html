<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026未來戰士2場地設備需求查詢</title>
    <style>
        :root { --primary-color: #2c3e50; --secondary-color: #18bc9c; --bg-color: #f8f9fa; --text-color: #333; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: var(--primary-color); text-align: center; font-size: 24px; margin-bottom: 20px; }
        .search-container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .search-box { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        .table-responsive { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 15px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        th { background-color: var(--primary-color); color: white; white-space: nowrap; }
        tr:hover { background-color: #f9f9f9; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-am { background-color: #ffeaa7; color: #d63031; }
        .badge-pm { background-color: #fab1a0; color: #e17055; }
        .btn-detail { background-color: var(--secondary-color); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; max-width: 450px; width: 90%; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #aaa; }
        .modal-list { padding-left: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>未來戰士2 場地與資材快速查詢系統</h1>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="搜尋日期、時段、課程、場地、負責人...">
    </div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>時段</th>
                    <th>課程名稱</th>
                    <th>場地名稱</th>
                    <th>學生人數</th>
                    <th>桌子張數</th>
                    <th>負責人</th>
                    <th>資材與設備</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">師資設備清單</h3>
        <ul id="modalList" class="modal-list"></ul>
    </div>
</div>

<script>
    // 💡 提取自您試算表的完整 31 筆精簡數據，絕對不會超過字數限制
    const staticCourseData = [
        { d: "07-20", p: "AM", c: "相見歡", v: "4F副堂", s: 130, t: 0, m: "鈞皓", e: "電腦、投影幕、麥克風X3" },
        { d: "07-20", p: "AM", c: "第一講", v: "4F副堂", s: 130, t: 0, m: "鈞皓", e: "電腦、投影幕、麥克風X3" },
        { d: "07-20", p: "PM", c: "第二講", v: "4F副堂", s: 130, t: 0, m: "鈞皓", e: "電腦、投影幕、麥克風X3" },
        { d: "07-20", p: "PM", c: "花生神魔術", v: "G105", s: 20, t: 10, m: "依婷", e: "筆電、投影幕、喇叭、撲克牌" },
        { d: "07-20", p: "PM", c: "花生神魔術", v: "G106", s: 20, t: 10, m: "依婷", e: "筆電、投影幕、喇叭、撲克牌" },
        { d: "07-20", p: "PM", c: "花生神魔術", v: "G107", s: 20, t: 10, m: "依婷", e: "筆電、投影幕、喇叭、撲克牌" },
        { d: "07-20", p: "PM", c: "桌遊王", v: "G101", s: 15, t: 4, m: "立中", e: "無" },
        { d: "07-20", p: "PM", c: "桌遊王", v: "G102", s: 15, t: 4, m: "立中", e: "無" },
        { d: "07-20", p: "PM", c: "桌遊王", v: "G103", s: 15, t: 4, m: "立中", e: "無" },
        { d: "07-20", p: "PM", c: "密室逃脫", v: "B1大堂", s: 25, t: 0, m: "建宏", e: "麥克風X2" },
        { d: "07-21", p: "AM", c: "晨更、靈修", v: "4F副堂", s: 130, t: 0, m: "鈞皓", e: "電腦、投影幕、麥克風X3" },
        { d: "07-21", p: "AM", c: "第三講", v: "4F副堂", s: 130, t: 0, m: "鈞皓", e: "電腦、投影幕、麥克風X3" },
        { d: "07-21", p: "PM", c: "第四講", v: "4F副堂", s: 130, t: 0, m: "鈞皓", e: "電腦、投影幕、麥克風X3" },
        { d: "07-21", p: "PM", c: "有畫直說", v: "701", s: 15, t: 6, m: "智誠", e: "麥克風、投影幕、筆電" },
        { d: "07-21", p: "PM", c: "有畫直說", v: "702", s: 15, t: 6, m: "智誠", e: "麥克風、投影幕、筆電" },
        { d: "07-21", p: "PM", c: "心靈花園小園丁", v: "703", s: 11, t: 7, m: "智誠", e: "電腦、投影幕、ppt遙控筆、筆X12、耳麥" },
        { d: "07-21", p: "PM", c: "心靈花園小園丁", v: "704", s: 11, t: 7, m: "智誠", e: "電腦、投影幕、ppt遙控筆、筆X12、耳麥" },
        { d: "07-21", p: "PM", c: "烘焙小達人", v: "B1餐廳", s: 30, t: 6, m: "淑惠", e: "烤箱X3、攪拌器X5、烤盤" },
        { d: "07-21", p: "PM", c: "手作卡片", v: "B1小教室", s: 20, t: 5, m: "美玲", e: "彩色筆、剪刀X20、膠水X20" },
        { d: "07-22", p: "AM", c: "團體動力", v: "4F副堂", s: 130, t: 0, m: "緯萍", e: "電腦、投影幕、麥克風X3" },
        { d: "07-22", p: "AM", c: "第五講", v: "4F副堂", s: 130, t: 0, m: "鈞皓", e: "電腦、投影幕、麥克風X3" },
        { d: "07-22", p: "PM", c: "第六講", v: "4F副堂", s: 130, t: 0, m: "鈞皓", e: "電腦、投影幕、麥克風X3" },
        { d: "07-22", p: "PM", c: "大地遊戲", v: "全", s: 130, t: 0, m: "緯萍", e: "瑋萍自備" },
        { d: "07-23", p: "AM", c: "晨更、靈修", v: "4F副堂", s: 130, t: 0, m: "鈞皓", e: "電腦、投影幕、麥克風X3" },
        { d: "07-23", p: "AM", c: "第七講", v: "4F副堂", s: 130, t: 0, m: "鈞皓", e: "電腦、投影幕、麥克風X3" },
        { d: "07-23", p: "PM", c: "第八講", v: "4F副堂", s: 130, t: 0, m: "鈞皓", e: "電腦、投影幕、麥克風X3" },
        { d: "07-23", p: "PM", c: "獻身會", v: "4F副堂", s: 130, t: 0, m: "天佑", e: "電腦、投影幕、麥克風X3、音響調校" },
        { d: "07-24", p: "AM", c: "心得分享", v: "4F副堂", s: 130, t: 0, m: "天佑", e: "電腦、投影幕、麥克風X3" },
        { d: "07-24", p: "AM", c: "結業式", v: "3F", s: 130, t: 0, m: "天佑", e: "電腦、投影幕、麥克風X3" },
        { d: "07-24", p: "PM", c: "場地復原", v: "全", s: 130, t: 0, m: "全體", e: "無" },
        { d: "07-24", p: "PM", c: "團康活動", v: "3F", s: 130, t: 0, m: "瑋萍", e: "瑋萍自備" }
    ];

    let sortedData = [];

    function init() {
        // 多重排序：日期 -> 時段 (AM在前) -> 教室名稱 A-Z
        sortedData = staticCourseData.sort((a, b) => {
            if (a.d !== b.d) return a.d.localeCompare(b.d);
            if (a.p !== b.p) return a.p === "AM" ? -1 : 1;
            return a.v.localeCompare(b.v, 'zh-Hant');
        });
        render(sortedData);
    }

    function render(targetData) {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        
        targetData.forEach((item, index) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td><b>2026-${item.d}</b></td>
                <td><span class="badge ${item.p === 'AM' ? 'badge-am' : 'badge-pm'}">${item.p}</span></td>
                <td>${item.c}</td>
                <td>${item.v}</td>
                <td>${item.s} 人</td>
                <td>${item.t} 張</td>
                <td>${item.m}</td>
                <td><button class="btn-detail" onclick="show('${item.c}', '${item.e}')">查看清單</button></td>
            `;
            tbody.appendChild(row);
        });
    }

    document.getElementById("searchInput").addEventListener("input", function(e) {
        const kw = e.target.value.toLowerCase();
        const filtered = sortedData.filter(item => 
            item.d.includes(kw) || item.p.toLowerCase().includes(kw) ||
            item.c.toLowerCase().includes(kw) || item.v.toLowerCase().includes(kw) ||
            item.m.toLowerCase().includes(kw)
        );
        render(filtered);
    });

    const modal = document.getElementById("detailModal");
    function show(course, eq) {
        document.getElementById("modalTitle").innerText = course + " - 設備資材清單";
        const list = document.getElementById("modalList");
        list.innerHTML = "";
        const items = eq.split('、');
        items.forEach(i => {
            if(i.trim()) {
                const li = document.createElement("li");
                li.innerText = i.trim();
                list.appendChild(li);
            }
        });
        modal.style.display = "flex";
    }
    function closeModal() { modal.style.display = "none"; }
    window.onclick = function(e) { if (e.target == modal) closeModal(); }

    init();
</script>
</body>
</html>
