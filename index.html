<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2024未來戰士2場地設備需求查詢</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #18bc9c;
            --bg-color: #f8f9fa;
            --text-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: var(--primary-color); text-align: center; margin-bottom: 30px; }

        /* 搜尋欄 */
        .search-container {
            background: white; padding: 20px; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        .search-box {
            width: 100%; padding: 10px 15px; border: 1px solid #ddd;
            border-radius: 4px; font-size: 16px; box-sizing: border-box;
        }

        /* 表格樣式 */
        .table-responsive {
            background: white; border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; }
        th { background-color: var(--primary-color); color: white; white-space: nowrap; }
        tr:hover { background-color: #f9f9f9; }

        /* 標籤與按鈕 */
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-am { background-color: #ffeaa7; color: #d63031; }
        .badge-pm { background-color: #fab1a0; color: #e17055; }
        .btn-detail {
            background-color: var(--secondary-color); color: white; border: none;
            padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: background 0.2s;
        }
        .btn-detail:hover { background-color: #128f76; }

        /* 彈出視窗 */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 8px;
            max-width: 500px; width: 90%; position: relative;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #aaa; }
        .close-btn:hover { color: #333; }
        .modal-list { padding-left: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>未來戰士2 場地與資材快速查詢系統</h1>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="輸入關鍵字搜尋（例如：日期、時段、場地、負責人、課程名稱）">
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>時段</th>
                    <th>課程名稱</th>
                    <th>場地名稱</th>
                    <th>學生人數</th>
                    <th>桌子張數</th>
                    <th>負責人</th>
                    <th>資材與設備</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">師資設備清單</h3>
        <ul id="modalList" class="modal-list"></ul>
    </div>
</div>

<script>
    // 💡 請在此處直接修改、填入您的課程場地資料！
    // 格式範例：date(日期), period(時段), course(課程名), venue(教室), students(學生數), tables(桌數), manager(負責人), equipment(資材，用顿号隔开)
    const staticCourseData = [
        { date: "2026-08-10", period: "AM", course: "AI 行銷實戰班", venue: "4F副堂", students: 35, tables: 18, manager: "天佑", equipment: "講師筆電x1、無線麥克風x2、白板筆" },
        { date: "2026-08-10", period: "AM", course: "兒童程式啟蒙班", venue: "2F小教室", students: 15, tables: 15, manager: "林專員", equipment: "廣播系統、簽到簿" },
        { date: "2026-08-10", period: "PM", course: "Python 數據分析", venue: "3F電腦教室", students: 25, tables: 13, manager: "天佑", equipment: "桌子X1、椅子X1、耳麥" },
        { date: "2026-08-11", period: "AM", course: "不凋花藝美學", venue: "4F副堂", students: 15, tables: 8, manager: "陳主任", equipment: "花藝剪刀x15、防水桌布x8" }
        // 👈 您可以直接複製上面的格式，在下方無限新增橫列...
    ];

    let globalCourseData = [];

    // 初始化與排序資料
    function initData() {
        // 將文字的頓號切割成清單陣列
        globalCourseData = staticCourseData.map(item => {
            return {
                ...item,
                equipmentList: item.equipment ? item.equipment.split('、') : []
            };
        });

        // 升級版自動多重排序：日期 -> 時段 (AM 在前) -> 場地名稱
        globalCourseData.sort((a, b) => {
            if (a.date !== b.date) {
                return new Date(a.date) - new Date(b.date);
            }
            if (a.period !== b.period) {
                return a.period === "AM" ? -1 : 1;
            }
            return a.venue.localeCompare(b.venue, 'zh-Hant');
        });

        renderTable(globalCourseData);
    }

    // 渲染表格
    function renderTable(data) {
        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";
        
        if(data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#999;">查無相符的行程資料</td></tr>`;
            return;
        }

        data.forEach((item, index) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td><b>${item.date}</b></td>
                <td><span class="badge ${item.period === 'AM' ? 'badge-am' : 'badge-pm'}">${item.period}</span></td>
                <td>${item.course}</td>
                <td>${item.venue}</td>
                <td>${item.students} 人</td>
                <td>${item.tables} 張</td>
                <td>${item.manager}</td>
                <td><button class="btn-detail" onclick="showDetails(${index})">查看清單</button></td>
            `;
            tableBody.appendChild(row);
        });
    }

    // 即時搜尋
    document.getElementById("searchInput").addEventListener("input", function(e) {
        const keyword = e.target.value.toLowerCase();
        const filteredData = globalCourseData.filter(item => 
            item.date.toString().includes(keyword) ||
            item.period.toLowerCase().includes(keyword) ||
            item.course.toLowerCase().includes(keyword) ||
            item.venue.toLowerCase().includes(keyword) ||
            item.manager.toLowerCase().includes(keyword)
        );
        renderTable(filteredData);
    });

    // 彈出視窗邏輯
    const modal = document.getElementById("detailModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalList = document.getElementById("modalList");

    function showDetails(index) {
        const item = globalCourseData[index];
        modalTitle.innerText = `${item.course} - 師資設備清單`;
        modalList.innerHTML = "";
        
        if (item.equipmentList.length === 0 || item.equipment === "無" || item.equipment === "") {
            modalList.innerHTML = "<li>無特殊設備資材需求</li>";
        } else {
            item.equipmentList.forEach(eq => {
                if(eq.trim() !== "") {
                    const li = document.createElement("li");
                    li.innerText = eq.trim();
                    modalList.appendChild(li);
                }
            });
        }
        modal.style.display = "flex";
    }

    function closeModal() { modal.style.display = "none"; }
    window.onclick = function(event) { if (event.target == modal) { closeModal(); } }

    // 啟動執行
    initData();
</script>

</body>
</html>
