<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026未來戰士2場地設備需求查詢</title>
    <style>
        :root { --primary-color: #2c3e50; --secondary-color: #18bc9c; --bg-color: #f8f9fa; --text-color: #333; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: var(--primary-color); text-align: center; font-size: 24px; margin-bottom: 20px; }
        .search-container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .search-box { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        .loading-status { text-align: center; color: #7f8c8d; font-size: 16px; margin: 20px 0; }
        .table-responsive { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 15px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        th { background-color: var(--primary-color); color: white; white-space: nowrap; }
        tr:hover { background-color: #f9f9f9; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-am { background-color: #ffeaa7; color: #d63031; }
        .badge-pm { background-color: #fab1a0; color: #e17055; }
        .btn-detail { background-color: var(--secondary-color); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; max-width: 450px; width: 90%; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #aaa; }
        .modal-list { padding-left: 20px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <h1>未來戰士2 場地與資材快速查詢系統</h1>
    
    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="搜尋日期、時段、課程、場地、負責人..." disabled>
    </div>

    <div id="loadingStatus" class="loading-status">正在即時連線抓取最新的雲端資材資料...</div>

    <div class="table-responsive" id="tableArea" style="display: none;">
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>時段</th>
                    <th>課程名稱</th>
                    <th>場地名稱</th>
                    <th>學生人數</th>
                    <th>桌子張數</th>
                    <th>負責人</th>
                    <th>資材與設備</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">師資設備清單</h3>
        <ul id="modalList" class="modal-list"></ul>
    </div>
</div>

<script>
    // 已直接為您植入正確的 Google 試算表發布連結，不需再手動填寫行數
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTkvgrGgc1nK-UVZnhTxRD8Vx53yIs3pVxT4m1YDl5KqgAd0pizHXxYj5pLTsYVxu5oweb0bSxqx5AO/pub?output=csv";

    let globalCourseData = [];

    async function loadCloudData() {
        try {
            const response = await fetch(CSV_URL);
            const csvText = await response.text();
            parseAndInitData(csvText);
        } catch (error) {
            console.error(error);
            document.getElementById("loadingStatus").innerText = "❌ 雲端連線失敗，請確認試算表仍處於發布狀態。";
            document.getElementById("loadingStatus").style.color = "#d63031";
        }
    }

    // 100% 精準本地 CSV 解析器（完美相容多欄位雙引號與中文頓號）
    function parseAndInitData(text) {
        let lines = []; let row = [""]; let inQuotes = false;
        for (let i = 0; i < text.length; i++) {
            let c = text[i]; let next = text[i+1];
            if (c === '"') {
                if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
                else { inQuotes = !inQuotes; }
            } else if (c === ',' && !inQuotes) { row.push(''); }
            else if ((c === '\r' || c === '\n') && !inQuotes) {
                if (c === '\r' && next === '\n') { i++; }
                lines.push(row); row = [''];
            } else { row[row.length - 1] += c; }
        }
        if (row.length > 1 || row !== '') lines.push(row);

        // 過濾無效資料並建立結構
        globalCourseData = lines.slice(1).filter(r => r.length >= 7 && r[0].trim() !== "").map(r => {
            // 解析日期格式，防呆去除不必要的時分秒文字
            let rawDate = r[0] ? r[0].trim() : "";
            if (rawDate.includes(" ")) rawDate = rawDate.split(" ")[0];
            if (rawDate.includes("T")) rawDate = rawDate.split("T")[0];

            return {
                date: rawDate,
                period: r[1] ? r[1].trim() : "",
                course: r[2] ? r[2].trim() : "",
                venue: r[3] ? r[3].trim() : "",
                students: r[4] ? r[4].trim() : "0",
                tables: r[5] ? r[5].trim() : "0",
                manager: r[6] ? r[6].trim() : "",
                equipment: r[7] ? r[7].trim() : "無",
                equipmentList: r[7] ? r[7].split('、') : []
            };
        });

        // 全自動多重排序：日期升冪 ➔ 時段 (AM在前) ➔ 教室名稱順序
        globalCourseData.sort((a, b) => {
            if (a.date !== b.date) return a.date.localeCompare(b.date);
            if (a.period !== b.period) return a.period === "AM" ? -1 : 1;
            return a.venue.localeCompare(b.venue, 'zh-Hant');
        });

        document.getElementById('loadingStatus').style.display = 'none';
        document.getElementById('searchInput').disabled = false;
        document.getElementById('tableArea').style.display = 'block';

        renderTable(globalCourseData);
    }

    function renderTable(data) {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        
        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:#999;">目前沒有相符的行程資料</td></tr>`;
            return;
        }

        data.forEach((item, index) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td><b>${item.date}</b></td>
                <td><span class="badge ${item.period === 'AM' ? 'badge-am' : 'badge-pm'}">${item.period}</span></td>
                <td>${item.course}</td>
                <td>${item.venue}</td>
                <td>${item.students} 人</td>
                <td>${item.tables} 張</td>
                <td>${item.manager}</td>
                <td><button class="btn-detail" onclick="showDetails(${index})">查看清單</button></td>
            `;
            tbody.appendChild(row);
        });
    }

    document.getElementById("searchInput").addEventListener("input", function(e) {
        const kw = e.target.value.toLowerCase();
        const filtered = globalCourseData.filter(item => 
            item.date.includes(kw) || item.period.toLowerCase().includes(kw) ||
            item.course.toLowerCase().includes(kw) || item.venue.toLowerCase().includes(kw) ||
            item.manager.toLowerCase().includes(kw)
        );
        renderTable(filtered);
    });

    const modal = document.getElementById("detailModal");
    function showDetails(index) {
        const item = globalCourseData[index];
        document.getElementById("modalTitle").innerText = item.course + " - 設備資材清單";
        const list = document.getElementById("modalList");
        list.innerHTML = "";
        if (item.equipment === "無" || item.equipment.trim() === "") {
            list.innerHTML = "<li>無特殊設備資材需求</li>";
        } else {
            item.equipmentList.forEach(eq => {
                if(eq.trim()) {
                    const li = document.createElement("li");
                    li.innerText = eq.trim();
                    list.appendChild(li);
                }
            });
        }
        modal.style.display = "flex";
    }
    function closeModal() { modal.style.display = "none"; }
    window.onclick = function(e) { if (e.target == modal) closeModal(); }

    loadCloudData();
</script>
</body>
</html>
