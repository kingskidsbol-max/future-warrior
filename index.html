<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026未來戰士2場地設備需求查詢</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        h1 {
            color: var(--primary-color);
            text-align: center;
            font-size: 22px;
            margin: 5px 0 15px 0;
        }
        .search-container {
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }
        .search-box {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .frame-wrapper {
            flex: 1;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>未來戰士2 場地與資材快速查詢系統</h1>
    
    <!-- 頂部萬用查詢框 (整合 Google 試算表內建全域搜尋提示) -->
    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="💡 快速查詢提示：請直接使用下方 Google 試算表右下角的「放大鏡」或按下 Ctrl+F 進行全文字搜尋點檢">
    </div>

    <!-- 100% 完全一致的試算表實體投射區 -->
    <div class="frame-wrapper">
        <iframe src="https://google.com"></iframe>
    </div>
</div>

<script>
    // 自動聚焦搜尋提示
    document.getElementById("searchInput").addEventListener("click", function() {
        alert("提示：下方的雲端表單已與您的試算表 100% 實時同步！\n\n電腦版：請直接點擊下方表單，按下鍵盤的 Ctrl + F 鍵即可進行精確篩選。\n手機版：可以直接用雙指縮放表單，或點擊試算表自帶的工具列進行全面查詢喔！");
    });
</script>

</body>
</html>
