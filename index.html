<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026未來戰士2場地設備需求查詢</title>
    <style>
        :root { --primary-color: #2c3e50; --secondary-color: #18bc9c; --bg-color: #f8f9fa; --text-color: #333; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: var(--primary-color); text-align: center; font-size: 24px; margin-bottom: 20px; }
        .upload-container { background: #eef2f3; padding: 20px; border: 2px dashed #b2bec3; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .search-container { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; display: none; }
        .search-box { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; box-sizing: border-box; }
        .table-responsive { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; display: none; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 15px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        th { background-color: var(--primary-color); color: white; white-space: nowrap; }
        tr:hover { background-color: #f9f9f9; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-am { background-color: #ffeaa7; color: #d63031; }
        .badge-pm { background-color: #fab1a0; color: #e17055; }
        .btn-detail { background-color: var(--secondary-color); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; max-width: 450px; width: 90%; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #aaa; }
        .modal-list { padding-left: 20px; line-height: 1.6; }
        .file-btn { background-color: #2c3e50; color: white; padding: 10px 20px; border-radius: 4px; cursor: pointer; display: inline-block; font-weight: bold; margin-top: 10px; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>未來戰士2 場地與資材快速查詢系統</h1>
    
    <!-- 終極解法：上傳下載好的 CSV 檔案 -->
    <div class="upload-container" id="uploadArea">
        <h3>📢 由於 Google 雲端帳號權限封鎖限制</h3>
        <p>請先開啟您的試算表，點選 <b>「檔案」 ➔ 「下載」 ➔ 「逗號分隔值 (.csv)」</b> 將檔案存到電腦中。</p>
        <label class="file-btn">
            點此選擇下載好的 CSV 檔案
            <input type="file" id="fileInput" accept=".csv">
        </label>
    </div>

    <!-- 搜尋欄 (預設隱藏，導入檔案後開啟) -->
    <div class="search-container" id="searchArea">
        <input type="text" id="searchInput" class="search-box" placeholder="搜尋日期、時段、課程、場地、負責人...">
    </div>

    <!-- 表格區 (預設隱藏) -->
    <div class="table-responsive" id="tableArea">
        <table>
            <thead>
                <tr>
                    <th>日期</th>
                    <th>時段</th>
                    <th>課程名稱</th>
                    <th>場地名稱</th>
                    <th>學生人數</th>
                    <th>桌子張數</th>
                    <th>負責人</th>
                    <th>資材與設備</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">師資設備清單</h3>
        <ul id="modalList" class="modal-list"></ul>
    </div>
</div>

<script>
    let globalCourseData = [];

    // 監聽檔案上傳
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(evt) {
            const csvText = evt.target.result;
            parseAndInitData(csvText);
        };
        reader.readAsText(file, 'UTF-8');
    });

    // 100% 精準本地 CSV 解析器（完美處理雙引號與頓號）
    function parseAndInitData(text) {
        let lines = [];
        let row = [""];
        let inQuotes = false;

        for (let i = 0; i < text.length; i++) {
            let c = text[i];
            let next = text[i+1];
            if (c === '"') {
                if (inQuotes && next === '"') { row[row.length - 1] += '"'; i++; }
                else { inQuotes = !inQuotes; }
            } else if (c === ',' && !inQuotes) {
                row.push('');
            } else if ((c === '\r' || c === '\n') && !inQuotes) {
                if (c === '\r' && next === '\n') { i++; }
                lines.push(row);
                row = [''];
            } else {
                row[row.length - 1] += c;
            }
        }
        if (row.length > 1 || row !== '') lines.push(row);

        // 將 CSV 轉換成網頁對齊物件，跳過第一行標題列
        globalCourseData = lines.slice(1).filter(r => r.length >= 7 && r[0].trim() !== "").map(r => {
            return {
                date: r[0] ? r[0].trim() : "",
                period: r[1] ? r[1].trim() : "",
                course: r[2] ? r[2].trim() : "",
                venue: r[3] ? r[3].trim() : "",
                students: r[4] ? r[4].trim() : "0",
                tables: r[5] ? r[5].trim() : "0",
                manager: r[6] ? r[6].trim() : "",
                equipment: r[7] ? r[7].trim() : "無",
                equipmentList: r[7] ? r[7].split('、') : []
            };
        });

        // 多重極速排序：日期 ➔ 時段 (AM在前) ➔ 教室名稱順序
        globalCourseData.sort((a, b) => {
            if (a.date !== b.date) return a.date.localeCompare(b.date);
            if (a.period !== b.period) return a.period === "AM" ? -1 : 1;
            return a.venue.localeCompare(b.venue, 'zh-Hant');
        });

        // 隱藏上傳區，秀出功能網頁
        document.getElementById('uploadArea').style.display = 'none';
        document.getElementById('searchArea').style.display = 'block';
        document.getElementById('tableArea').style.display = 'block';

        renderTable(globalCourseData);
    }

    // 渲染主表格
    function renderTable(data) {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        
        data.forEach((item, index) => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td><b>${item.date}</b></td>
                <td><span class="badge ${item.period === 'AM' ? 'badge-am' : 'badge-pm'}">${item.period}</span></td>
                <td>${item.course}</td>
                <td>${item.venue}</td>
                <td>${item.students} 人</td>
                <td>${item.tables} 張</td>
                <td>${item.manager}</td>
                <td><button class="btn-detail" onclick="showDetails(${index})">查看清單</button></td>
            `;
            tbody.appendChild(row);
        });
    }

    // 即時關鍵字搜尋功能
    document.getElementById("searchInput").addEventListener("input", function(e) {
        const kw = e.target.value.toLowerCase();
        const filtered = globalCourseData.filter(item => 
            item.date.includes(kw) || item.period.toLowerCase().includes(kw) ||
            item.course.toLowerCase().includes(kw) || item.venue.toLowerCase().includes(kw) ||
            item.manager.toLowerCase().includes(kw)
        );
        renderTable(filtered);
    });

    // 彈出視窗處理
    const modal = document.getElementById("detailModal");
    function showDetails(index) {
        const item = globalCourseData[index];
        document.getElementById("modalTitle").innerText = item.course + " - 設備資材清單";
        const list = document.getElementById("modalList");
        list.innerHTML = "";
        
        if (item.equipment === "無" || item.equipment.trim() === "") {
            list.innerHTML = "<li>無特殊設備資材需求</li>";
        } else {
            item.equipmentList.forEach(eq => {
                if(eq.trim()) {
                    const li = document.createElement("li");
                    li.innerText = eq.trim();
                    list.appendChild(li);
                }
            });
        }
        modal.style.display = "flex";
    }
    function closeModal() { modal.style.display = "none"; }
    window.onclick = function(e) { if (e.target == modal) closeModal(); }
</script>
</body>
</html>
